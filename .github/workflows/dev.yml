name: Python Project CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.run_number }}

jobs:

################################################################################
# CI
################################################################################

  build:
    name: Build Test Scan Push
    runs-on: ubuntu-latest

    steps:

      ###############################################################
      # Checkout
      ###############################################################

      - name: Checkout Source Code
        uses: actions/checkout@v4

      ###############################################################
      # Python
      ###############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      ###############################################################
      # Install
      ###############################################################

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      ###############################################################
      # Unit Test
      ###############################################################

      - name: Run Django Tests
        working-directory: ./devops
        run: |
          python manage.py test

      ###############################################################
      # Dependency Scan
      ###############################################################

      - name: Install pip-audit
        run: |
          pip install pip-audit

      - name: Dependency Scan
        run: |
          pip-audit

      ###############################################################
      # SonarQube
      ###############################################################

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      ###############################################################
      # AWS Login
      ###############################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ###############################################################
      # Login ECR
      ###############################################################

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      ###############################################################
      # Build Docker
      ###############################################################

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REPOSITORY:latest .

      ###############################################################
      # Trivy
      ###############################################################

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      ###############################################################
      # Tag Images
      ###############################################################

      - name: Tag Docker Image
        run: |
          docker tag \
          $ECR_REPOSITORY:$IMAGE_TAG \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      ###############################################################
      # Push Images
      ###############################################################

      - name: Push Docker Image
        run: |
          docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

################################################################################
# CD
################################################################################

  deploy:

    name: Deploy to EC2

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Deploy Application to EC2

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.EC2_HOST }}

          username: ${{ secrets.EC2_USERNAME }}

          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

          script: |

            echo "Login to Amazon ECR"

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login \
            --username AWS \
            --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            echo "Pull Latest Image"

            docker pull \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            echo "Stop Existing Container"

            docker stop python-app || true

            echo "Remove Existing Container"

            docker rm python-app || true

            echo "Cleanup Old Images"

            docker image prune -f

            echo "Run New Container"

            docker run -d \
            --name python-app \
            --restart unless-stopped \
            -p 8080:8000 \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            echo "Running Containers"

            docker ps

            echo "Deployment Completed Successfully"